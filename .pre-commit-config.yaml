fail_fast: true
repos:
  - repo: local
    hooks:
      - id: autoflake
        name: Remove unused variables and imports
        entry: autoflake
        language: python
        args:
          [
            "--in-place",
            "--remove-all-unused-imports",
            "--expand-star-imports",
            "--ignore-init-module-imports",
          ]
      - id: isort
        name: Sorting import statements
        entry: isort
        language: python
        types: [file, python]
      - id: black
        name: Black Python code formatting
        entry: black
        language: python
        types: [file, python]
        args: [--line-length=120]
